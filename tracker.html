<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트래커 — SnackBurn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- NAV -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">🔥 SnackBurn</a>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="메뉴">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">홈</a></li>
      <li><a href="tracker.html" class="active">트래커</a></li>
      <li><a href="workout.html">운동</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <div class="page-header">
      <h1>군것질 트래커</h1>
      <p>식사 외에 먹은 군것질을 모두 기록하세요. 칼로리는 저희가 계산해 드릴게요.</p>
    </div>

    <!-- TOTAL DISPLAY -->
    <section class="total-card">
      <p class="total-label">오늘의 군것질 칼로리</p>
      <div class="total-num"><span id="totalCalories">0</span><span class="total-unit">kcal</span></div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-hint" id="progressHint">하루 군것질 권장량: 약 200 kcal</p>
    </section>

    <!-- ADD FORM -->
    <section class="card add-form">
      <div class="add-row">
        <div class="form-group grow">
          <label for="snackName">군것질 이름</label>
          <input type="text" id="snackName" placeholder="예: 초코칩 쿠키"
                 onkeydown="if(event.key==='Enter') addSnack()" />
        </div>
        <div class="form-group qty">
          <label for="snackQty">개수</label>
          <input type="number" id="snackQty" value="1" min="1" max="20" />
        </div>
      </div>
      <div id="formError" class="error-msg hidden"></div>
      <button class="btn-primary" id="addBtn" onclick="addSnack()">+ 군것질 추가</button>
    </section>

    <!-- SNACK LIST -->
    <section class="snack-list-section">
      <div class="list-header">
        <h2>오늘의 기록</h2>
        <button class="btn-ghost btn-sm hidden" id="clearBtn" onclick="confirmClear()">전체 삭제</button>
      </div>

      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">🍪</div>
        <p>아직 기록이 없어요. 위에서 첫 군것질을 추가해보세요!</p>
      </div>

      <ul class="snack-list" id="snackList"></ul>
    </section>

    <a href="workout.html" class="btn-secondary full hidden" id="workoutCta">어떻게 태울지 보기 →</a>
  </main>

  <!-- CLEAR CONFIRM MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h3>오늘 기록을 모두 지울까요?</h3>
      <p>오늘 기록한 모든 군것질이 삭제됩니다.</p>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">취소</button>
        <button class="btn-danger" onclick="doClear()">삭제</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>SnackBurn · Claude AI로 제작 · 인공지능 프로그래밍 입문 2026</p>
  </footer>

  <script src="storage.js"></script>
  <script>
    const GUIDELINE = 200; // 진행 바 기준이 되는 하루 군것질 권장 칼로리

    function toggleNav() {
      document.getElementById('navLinks').classList.toggle('open');
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setError(msg) {
      const el = document.getElementById('formError');
      el.textContent = msg;
      el.classList.toggle('hidden', !msg);
    }

    // ── 군것질 추가 ───────────────────────────────────────────
    async function addSnack() {
      const name = document.getElementById('snackName').value.trim();
      const qty = parseInt(document.getElementById('snackQty').value) || 1;
      setError('');

      if (!name) return setError('군것질 이름을 먼저 입력하세요.');

      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      btn.textContent = '계산 중…';

      try {
        const prompt = `다음 군것질의 칼로리를 추정해줘: "${name}", 개수: ${qty}개.

반드시 아래 형식의 유효한 JSON 객체만 반환해줘 (마크다운, 추가 설명 없이):
{ "calories": 숫자, "note": "이 군것질에 대한 짧고 친근한 한 줄 코멘트(한국어)" }

calories 값은 주어진 개수에 대한 총 칼로리를 하나의 정수로 표현해줘. 입력이 음식이 아니라면 { "calories": 0, "note": "이건 군것질이 아닌 것 같아요!" } 를 반환해줘.`;

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 300,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        let raw = data.content.map(b => b.type === 'text' ? b.text : '').join('');
        raw = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
        const result = JSON.parse(raw);

        if (!result.calories || result.calories <= 0) {
          setError(result.note || '이건 군것질이 아닌 것 같아요. 다시 시도해보세요!');
          return;
        }

        SnackStore.addSnack({
          id: Date.now().toString(),
          name: name,
          qty: qty,
          calories: Math.round(result.calories),
          note: result.note || ''
        });

        document.getElementById('snackName').value = '';
        document.getElementById('snackQty').value = '1';
        render();

      } catch (err) {
        console.error(err);
        setError('칼로리를 계산하지 못했어요. 다시 시도해주세요.');
      } finally {
        btn.disabled = false;
        btn.textContent = '+ 군것질 추가';
      }
    }

    // ── 군것질 삭제 ───────────────────────────────────────────
    function removeSnack(id) {
      SnackStore.removeSnack(id);
      render();
    }

    // ── 전체 삭제 ─────────────────────────────────────────────
    function confirmClear() { show('modalOverlay'); }
    function closeModal() { hide('modalOverlay'); }
    function doClear() {
      SnackStore.clearDay();
      closeModal();
      render();
    }
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ── 렌더링 ────────────────────────────────────────────────
    function render() {
      const snacks = SnackStore.getToday();
      const total = snacks.reduce((s, x) => s + (x.calories || 0), 0);

      // 합계 + 진행 바
      document.getElementById('totalCalories').textContent = total;
      const pct = Math.min((total / GUIDELINE) * 100, 100);
      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.style.background = total > GUIDELINE ? 'var(--danger)' : 'var(--accent)';
      document.getElementById('progressHint').textContent =
        total > GUIDELINE
          ? `권장량(약 ${GUIDELINE} kcal)보다 ${total - GUIDELINE} kcal 초과`
          : `하루 군것질 권장량: 약 ${GUIDELINE} kcal`;

      // 목록
      const list = document.getElementById('snackList');
      list.innerHTML = '';
      if (snacks.length === 0) {
        show('emptyState');
        hide('clearBtn');
        hide('workoutCta');
      } else {
        hide('emptyState');
        show('clearBtn');
        show('workoutCta');
        snacks.forEach(s => {
          const li = document.createElement('li');
          li.className = 'snack-item';
          li.innerHTML = `
            <div class="snack-emoji">${snackEmoji(s.name)}</div>
            <div class="snack-info">
              <span class="snack-name">${escHtml(s.name)}${s.qty > 1 ? ` ×${s.qty}` : ''}</span>
              ${s.note ? `<span class="snack-note">${escHtml(s.note)}</span>` : ''}
            </div>
            <span class="snack-cal">${s.calories} kcal</span>
            <button class="snack-remove" onclick="removeSnack('${s.id}')" aria-label="삭제">✕</button>
          `;
          list.appendChild(li);
        });
      }
    }

    // ── 헬퍼 ──────────────────────────────────────────────────
    const FOOD_EMOJIS = {
      '초코': '🍫', 'choc': '🍫', '쿠키': '🍪', 'cookie': '🍪', '과자': '🍪',
      '칩': '🍟', 'chip': '🍟', '감자': '🍟', '콜라': '🥤', 'cola': '🥤', '음료': '🥤', '사이다': '🥤',
      '커피': '☕', 'coffee': '☕', '라떼': '☕', 'latte': '☕', '케이크': '🍰', 'cake': '🍰',
      '사탕': '🍬', 'candy': '🍬', '젤리': '🍬', '아이스': '🍦', '아이스크림': '🍦', 'ice': '🍦',
      '도넛': '🍩', 'donut': '🍩', '피자': '🍕', 'pizza': '🍕', '버거': '🍔', '햄버거': '🍔',
      '빵': '🍞', 'bread': '🍞', '바나나': '🍌', '사과': '🍎', '견과': '🥜', '땅콩': '🥜',
      '팝콘': '🍿', 'popcorn': '🍿', '주스': '🧃', 'juice': '🧃', '초콜릿': '🍫'
    };
    function snackEmoji(name) {
      const lower = name.toLowerCase();
      for (const key in FOOD_EMOJIS) {
        if (lower.includes(key.toLowerCase())) return FOOD_EMOJIS[key];
      }
      return '🍴';
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
